openapi: 3.0.0
info:
  title: Ingredient Management API
  description: API for managing ingredients, dishes, and their stock movements
  version: 1.0.0
  contact:
    name: HEI School

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Hello
    description: Health check endpoints
  - name: Ingredients
    description: Ingredient management endpoints
  - name: Dishes
    description: Dish management endpoints

paths:
  /hello:
    get:
      tags:
        - Hello
      summary: Health check
      description: Returns a greeting message to verify the API is running
      operationId: hello
      responses:
        '200':
          description: Successful health check
          content:
            text/plain:
              schema:
                type: string
                example: "Hello World!"

  /ingredients:
    get:
      tags:
        - Ingredients
      summary: Get all ingredients
      description: Retrieves a list of all available ingredients
      operationId: getIngredients
      responses:
        '200':
          description: Successfully retrieved list of ingredients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ingredient'
        '400':
          description: Bad request
          content:
            text/plain:
              schema:
                type: string
        '404':
          description: Not found
          content:
            text/plain:
              schema:
                type: string
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string

  /ingredients/{id}:
    get:
      tags:
        - Ingredients
      summary: Get ingredient by ID
      description: Retrieves a specific ingredient by its identifier
      operationId: getIngredientById
      parameters:
        - name: id
          in: path
          required: true
          description: The ingredient ID
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Successfully retrieved ingredient
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ingredient'
        '400':
          description: Bad request
          content:
            text/plain:
              schema:
                type: string
        '404':
          description: Ingredient not found
          content:
            text/plain:
              schema:
                type: string
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string

  /ingredients/{id}/stock:
    get:
      tags:
        - Ingredients
      summary: Get ingredient stock at a specific time
      description: Retrieves the stock value of an ingredient at a specific point in time with a specified unit
      operationId: getIngredientStockById
      parameters:
        - name: id
          in: path
          required: true
          description: The ingredient ID
          schema:
            type: integer
            format: int32
        - name: at
          in: query
          required: true
          description: The instant in time to get the stock value (ISO 8601 format)
          schema:
            type: string
            format: date-time
        - name: unit
          in: query
          required: true
          description: The unit for stock measurement
          schema:
            $ref: '#/components/schemas/Unit'
      responses:
        '200':
          description: Successfully retrieved stock value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockValue'
        '400':
          description: Bad request
          content:
            text/plain:
              schema:
                type: string
        '404':
          description: Ingredient not found
          content:
            text/plain:
              schema:
                type: string
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string

  /dishes:
    get:
      tags:
        - Dishes
      summary: Get all dishes
      description: Retrieves a list of all available dishes with their ingredients
      operationId: getDishes
      responses:
        '200':
          description: Successfully retrieved list of dishes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DishRest'
        '400':
          description: Bad request
          content:
            text/plain:
              schema:
                type: string
        '404':
          description: Not found
          content:
            text/plain:
              schema:
                type: string
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string

components:
  schemas:
    Ingredient:
      type: object
      description: Represents an ingredient in the system
      properties:
        id:
          type: integer
          format: int32
          description: Unique identifier for the ingredient
        name:
          type: string
          description: Name of the ingredient
        category:
          $ref: '#/components/schemas/CategoryEnum'
        price:
          type: number
          format: double
          description: Price of the ingredient

    DishRest:
      type: object
      description: REST representation of a dish with its ingredients
      properties:
        id:
          type: integer
          format: int32
          description: Unique identifier for the dish
        name:
          type: string
          description: Name of the dish
        price:
          type: number
          format: double
          description: Price of the dish
        dishIngredients:
          type: array
          description: List of ingredients in this dish
          items:
            $ref: '#/components/schemas/DishIngredientRest'

    DishIngredientRest:
      type: object
      description: REST representation of an ingredient within a dish
      properties:
        id:
          type: integer
          format: int32
          description: Ingredient ID
        name:
          type: string
          description: Ingredient name
        category:
          $ref: '#/components/schemas/CategoryEnum'
        price:
          type: number
          format: double
          description: Ingredient price

    StockValue:
      type: object
      description: Represents the stock value of an ingredient at a specific time
      properties:
        quantity:
          type: number
          format: double
          description: Quantity of the ingredient in stock
        unit:
          $ref: '#/components/schemas/Unit'

    CategoryEnum:
      type: string
      description: Category of an ingredient
      enum:
        - VEGETABLE
        - MEAT
        - DAIRY
        - SPICE
        - OTHER

    Unit:
      type: string
      description: Unit of measurement for ingredients
      enum:
        - KILOGRAM
        - GRAM
        - LITER
        - MILLILITER
        - PIECE
        - UNIT